spring:
    application:
        name: ms-cuentas

    datasource:
        url: ${MS_CUENTAS_DB_URL:jdbc:postgresql://localhost:5432/cuentas_db}
        username: ${MS_CUENTAS_DB_USERNAME:cuentas_user}
        password: ${MS_CUENTAS_DB_PASSWORD:cuentas_pass}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
        open-in-view: false

    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        baseline-version: 0
        create-schemas: true
        schemas: public
        default-schema: public
        clean-disabled: false

    rabbitmq:
        host: ${SPRING_RABBITMQ_HOST:localhost}
        port: ${SPRING_RABBITMQ_PORT:5672}
        username: ${SPRING_RABBITMQ_USERNAME:guest}
        password: ${SPRING_RABBITMQ_PASSWORD:guest}

server:
    port: ${SERVER_PORT:8082}

management:
    endpoints:
        web:
            exposure:
                include: health,info

app:
    messaging:
        exchange: ${APP_MESSAGING_EXCHANGE:banking.events}
        queues:
            movimientos-commands: ${APP_MESSAGING_QUEUE_MOVIMIENTOS_COMMANDS:ms-cuentas.movimientos-commands}
        routing-keys:
            debito-solicitado: ${APP_MESSAGING_RK_DEBITO_SOLICITADO:movimientos.debito-solicitado}
            credito-solicitado: ${APP_MESSAGING_RK_CREDITO_SOLICITADO:movimientos.credito-solicitado}
            saldo-actualizado: ${APP_MESSAGING_RK_SALDO_ACTUALIZADO:cuentas.saldo-actualizado}
            saldo-rechazado: ${APP_MESSAGING_RK_SALDO_RECHAZADO:cuentas.saldo-rechazado}
