spring:
  application:
    name: ms-clientes

  datasource:
    # Variables de entorno por microservicio (evita colisiones con otros MS)
    url: ${MS_CLIENTES_DB_URL:jdbc:postgresql://localhost:5432/clientes_db}
    username: ${MS_CLIENTES_DB_USERNAME:clientes_user}
    password: ${MS_CLIENTES_DB_PASSWORD:clientes_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    create-schemas: true
    schemas: public
    default-schema: public
    clean-disabled: false

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
