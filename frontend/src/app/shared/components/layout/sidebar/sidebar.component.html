<aside class="sidebar" aria-label="Navegación principal">
    <div class="sidebar__brand">
        <div class="sidebar__logo" aria-hidden="true"></div>
        <div class="sidebar__brand-text">
            <div class="sidebar__title">Challenge</div>
            <div class="sidebar__subtitle">Microservicios</div>
        </div>
    </div>

    <nav class="sidebar__nav" aria-label="Secciones">
        <a class="sidebar__item" *ngFor="let item of navItems" [routerLink]="item.path" routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }">
            {{ item.label }}
        </a>
    </nav>

    <div class="sidebar__footer">
        <div class="sidebar__hint">Richard Guach</div>
    </div>
</aside>
