<button class="btn" [class.btn--primary]="variant === 'primary'" [class.btn--secondary]="variant === 'secondary'"
    [class.btn--danger]="variant === 'danger'" [class.btn--ghost]="variant === 'ghost'" [class.btn--sm]="size === 'sm'"
    [disabled]="disabled || loading" [attr.type]="type" (click)="onClick()">
    <span class="btn__spinner" *ngIf="loading"></span>
    <ng-content></ng-content>
</button>
